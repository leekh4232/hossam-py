name: Deploy MkDocs to GitHub Pages (on "build" commit)

on:
  push:
    branches:
      - main  # main 브랜치 push 중 커밋 메시지에 'build'가 포함된 경우에만 문서 배포
  workflow_dispatch:  # 필요 시 수동 실행

permissions:
  contents: write  # gh-pages 브랜치에 빌드 결과를 푸시하기 위해 필요

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true  # 최신 문서만 배포하면 되므로 진행 중 작업 취소 허용

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 수동 실행이거나, 커밋 메시지에 'build' 문자열이 포함된 push일 때만 실행
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'build')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material "mkdocstrings[python]" \
            pymdown-extensions mkdocs-autorefs black

      - name: Copy README to docs/index.md
        run: cp -f README.md docs/index.md

      - name: Build site
        run: mkdocs build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: py.hossam.kr
